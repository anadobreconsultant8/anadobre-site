<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 860" font-family="DM Sans, Arial, sans-serif">

  <!-- Background -->
  <rect width="720" height="860" fill="#f0f5fb" rx="16"/>

  <!-- Title -->
  <text x="360" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#03306E">Flux automatizare conținut — Human-in-the-Loop cu Agenți AI</text>

  <!-- ═══ STEP 1: USER INPUT ═══ -->
  <rect x="210" y="70" width="300" height="72" rx="12" fill="#03306E"/>
  <text x="360" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="white">Tu completezi templateul lunar</text>
  <text x="360" y="116" text-anchor="middle" font-size="11" fill="#a8c4e8">obiective · ofertă · constrângeri · assets</text>
  <text x="360" y="132" text-anchor="middle" font-size="11" fill="#7eb8f7">→ adaugi documentul în Google Drive (Folder 1)</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="142" x2="360" y2="172" stroke="#03306E" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="354,170 360,182 366,170" fill="#03306E"/>

  <!-- Trigger badge -->
  <rect x="270" y="154" width="180" height="22" rx="11" fill="#E8593C"/>
  <text x="360" y="169" text-anchor="middle" font-size="10" font-weight="700" fill="white" letter-spacing="0.5">TRIGGER: fișier nou în folder</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="176" x2="360" y2="200" stroke="#03306E" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="354,198 360,210 366,198" fill="#03306E"/>

  <!-- ═══ STEP 2: ORCHESTRATOR ═══ -->
  <rect x="160" y="210" width="400" height="90" rx="12" fill="white" stroke="#03306E" stroke-width="2"/>
  <rect x="160" y="210" width="400" height="30" rx="12" fill="#03306E"/>
  <rect x="160" y="228" width="400" height="12" rx="0" fill="#03306E"/>
  <text x="360" y="231" text-anchor="middle" font-size="13" font-weight="700" fill="white">Orchestrator AI</text>
  <text x="360" y="258" text-anchor="middle" font-size="11" fill="#4A5568">citește documentul · analizează obiectivele</text>
  <text x="360" y="275" text-anchor="middle" font-size="11" fill="#4A5568">creează: plan săptămânal · executive summary</text>
  <text x="360" y="292" text-anchor="middle" font-size="11" fill="#E8593C" font-weight="600">→ livrează în Google Drive (Folder 2, Doc output)</text>

  <!-- Arrow 3 -->
  <line x1="360" y1="300" x2="360" y2="326" stroke="#03306E" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="354,324 360,336 366,324" fill="#03306E"/>

  <!-- ═══ STEP 3: HUMAN DECISION ═══ -->
  <!-- Diamond shape -->
  <polygon points="360,336 500,390 360,444 220,390" fill="#fff7f5" stroke="#E8593C" stroke-width="2.5"/>
  <text x="360" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#E8593C">Decizia TA</text>
  <text x="360" y="400" text-anchor="middle" font-size="11" fill="#4A5568">revizuiești planul din doc</text>

  <!-- Decision options -->
  <!-- OK -->
  <rect x="50" y="470" width="100" height="36" rx="8" fill="#1D9E75"/>
  <text x="100" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="white">✓  OK</text>
  <!-- Revizuire -->
  <rect x="310" y="470" width="100" height="36" rx="8" fill="#C9880C"/>
  <text x="360" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="white">Revizuire</text>
  <!-- Stop -->
  <rect x="570" y="470" width="100" height="36" rx="8" fill="#B91C1C"/>
  <text x="620" y="492" text-anchor="middle" font-size="12" font-weight="700" fill="white">✕  Stop</text>

  <!-- Lines from diamond to options -->
  <!-- to OK -->
  <line x1="220" y1="390" x2="100" y2="390" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="100" y1="390" x2="100" y2="470" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="155" y="385" text-anchor="middle" font-size="10" fill="#1D9E75" font-weight="600">OK</text>
  <!-- to Revizuire -->
  <line x1="360" y1="444" x2="360" y2="470" stroke="#C9880C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="385" y="462" text-anchor="middle" font-size="10" fill="#C9880C" font-weight="600">Revizuire</text>
  <!-- to Stop -->
  <line x1="500" y1="390" x2="620" y2="390" stroke="#B91C1C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="620" y1="390" x2="620" y2="470" stroke="#B91C1C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="565" y="385" text-anchor="middle" font-size="10" fill="#B91C1C" font-weight="600">Stop</text>

  <!-- Revizuire loop back -->
  <line x1="360" y1="506" x2="360" y2="526" stroke="#C9880C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="360" y1="526" x2="530" y2="526" stroke="#C9880C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="530" y1="526" x2="530" y2="255" stroke="#C9880C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="530" y1="255" x2="560" y2="255" stroke="#C9880C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="548" y="395" text-anchor="start" font-size="9" fill="#C9880C">ajustare</text>
  <!-- Stop end -->
  <text x="620" y="524" text-anchor="middle" font-size="10" fill="#B91C1C">flux oprit</text>

  <!-- Arrow from OK down -->
  <line x1="100" y1="506" x2="100" y2="540" stroke="#1D9E75" stroke-width="2"/>
  <polygon points="94,538 100,550 106,538" fill="#1D9E75"/>

  <!-- ═══ STEP 4: TWO AGENTS ═══ -->
  <!-- Agent Continut -->
  <rect x="20" y="550" width="220" height="110" rx="12" fill="white" stroke="#2B6DB8" stroke-width="2"/>
  <rect x="20" y="550" width="220" height="30" rx="12" fill="#2B6DB8"/>
  <rect x="20" y="568" width="220" height="12" rx="0" fill="#2B6DB8"/>
  <text x="130" y="571" text-anchor="middle" font-size="12" font-weight="700" fill="white">Agent Conținut</text>
  <text x="130" y="598" text-anchor="middle" font-size="10" fill="#4A5568">· idei postări LinkedIn</text>
  <text x="130" y="614" text-anchor="middle" font-size="10" fill="#4A5568">· drafturi articole blog (SEO/GEO)</text>
  <text x="130" y="630" text-anchor="middle" font-size="10" fill="#4A5568">· plan pe săptămâni</text>
  <text x="130" y="648" text-anchor="middle" font-size="10" fill="#2B6DB8" font-weight="600">limitat: 10 idei · 2 drafturi</text>

  <!-- Line from OK to Agent Lead -->
  <line x1="100" y1="550" x2="100" y2="560" stroke="#1D9E75" stroke-width="1"/>
  <!-- Line connecting the two agents at top -->
  <line x1="240" y1="605" x2="280" y2="605" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Agent Lead Management -->
  <rect x="280" y="550" width="220" height="110" rx="12" fill="white" stroke="#2B6DB8" stroke-width="2"/>
  <rect x="280" y="550" width="220" height="30" rx="12" fill="#2B6DB8"/>
  <rect x="280" y="568" width="220" height="12" rx="0" fill="#2B6DB8"/>
  <text x="390" y="571" text-anchor="middle" font-size="12" font-weight="700" fill="white">Agent Lead Management</text>
  <text x="390" y="598" text-anchor="middle" font-size="10" fill="#4A5568">· fluxuri de follow-up</text>
  <text x="390" y="614" text-anchor="middle" font-size="10" fill="#4A5568">· idei welcome emails</text>
  <text x="390" y="630" text-anchor="middle" font-size="10" fill="#4A5568">· logică lead management</text>
  <text x="390" y="648" text-anchor="middle" font-size="10" fill="#2B6DB8" font-weight="600">sisteme automate de conversie</text>

  <!-- Arrows from agents down -->
  <line x1="130" y1="660" x2="130" y2="690" stroke="#03306E" stroke-width="2"/>
  <line x1="390" y1="660" x2="390" y2="690" stroke="#03306E" stroke-width="2"/>
  <line x1="130" y1="690" x2="390" y2="690" stroke="#03306E" stroke-width="2"/>
  <line x1="260" y1="690" x2="260" y2="714" stroke="#03306E" stroke-width="2"/>
  <polygon points="254,712 260,724 266,712" fill="#03306E"/>

  <!-- ═══ STEP 5: OUTPUT ═══ -->
  <rect x="110" y="724" width="300" height="72" rx="12" fill="#03306E"/>
  <text x="260" y="752" text-anchor="middle" font-size="13" font-weight="700" fill="white">Output în Google Drive (Folder 2)</text>
  <text x="260" y="770" text-anchor="middle" font-size="11" fill="#a8c4e8">plan + drafturi + recomandări automatizări</text>
  <text x="260" y="786" text-anchor="middle" font-size="11" fill="#7eb8f7">tu revizuiești, adaptezi, aprobi și postezi</text>

  <!-- Footer note -->
  <text x="360" y="830" text-anchor="middle" font-size="10" fill="#8E99A4">Automatizare construită în n8n · control uman în fiecare etapă cheie</text>

</svg>
